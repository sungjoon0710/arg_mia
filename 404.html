    />
    <title>ARG MIA</title>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1;
      var l = window.location;
      var r = l.pathname.split('/').slice(1);
      var s = r.slice(0, pathSegmentsToKeep).join('/') + '/';
      var m = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
      var f = l.search;
      var d = l.hash;
      var c = l.href;
      var h = l.origin;
      var p = l.hostname;
      var u = h + '/' + s + m + f + d;
      var a = document.getElementById('root');
      if (a) {
        a.innerHTML = 'Redirecting...';
      }
      window.location.replace(u);
    </script>
  </body>
